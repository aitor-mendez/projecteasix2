# --------
# SERVEIS
# --------

services:

  # ---------------
  # Bases de dades
  # ---------------

  db-products:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: C0ntr@FQrt4_2026!
      MYSQL_DATABASE: products
    volumes:
      - db_products_data:/var/lib/mysql
    networks:
      - backend_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-orders:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: C0ntr@FQrt4_2026!
      MYSQL_DATABASE: orders
    volumes:
      - db_orders_data:/var/lib/mysql
    networks:
      - backend_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------
  # Memòria cau
  # ------------

  cache:
    image: redis:7.4.6-alpine
    networks:
      - backend_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------
  # Cua de missatges
  # -----------------

  message-queue:
    image: rabbitmq:3-management
    ports:
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - backend_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------
  # Microserveis
  # -------------

  product-service:
    build: ./product-service
    environment:
      DB_HOST: db-products
      CACHE_HOST: cache
    depends_on:
      db-products:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - backend_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/products"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s


  order-service:
    build: ./order-service
    environment:
      DB_HOST: db-orders
      MQ_HOST: message-queue
    depends_on:
      db-orders:
        condition: service_healthy
      message-queue:
        condition: service_healthy
    networks:
      - backend_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/order"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  user-service:
    build: ./user-service
    environment:
      DB_HOST: db-orders
    depends_on:
      db-orders:
        condition: service_healthy
    networks:
      - backend_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/login"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  notification-service:
    build: ./notification-service
    environment:
      MQ_HOST: message-queue
    depends_on:
      message-queue:
        condition: service_healthy
    networks:
      - backend_network

  # -----------------------
  # API Gateway i frontend
  # -----------------------

  api-gateway:
    image: nginx:latest
    ports:
      - "8090:80"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    command: ["/bin/sh", "-c", "rm /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"]
    depends_on:
      product-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
    networks:
      - frontend_network
      - backend_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    networks:
      - frontend_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

# ----------------
# XARXES I VOLUMS
# ----------------

networks:
  frontend_network:
  backend_network:

volumes:
  db_products_data:
  db_orders_data:
  rabbitmq_data:
